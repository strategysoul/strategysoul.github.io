<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#1C160E"/>
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <!-- North point — terracotta, tall -->
  <polygon points="16,3 14.2,16 16,13.5 17.8,16" fill="#C4622D"/>
  <!-- South point — muted -->
  <polygon points="16,29 14.2,16 16,18.5 17.8,16" fill="#5C4F42"/>
  <!-- East point — muted, shorter -->
  <polygon points="29,16 16,14.2 18.5,16 16,17.8" fill="#5C4F42"/>
  <!-- West point — muted, shorter -->
  <polygon points="3,16 16,14.2 13.5,16 16,17.8" fill="#5C4F42"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.6" fill="#FAF8F4"/>
</svg>
